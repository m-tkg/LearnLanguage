name: LearnLanguage
options:
  bundleIdPrefix: com.mtkg
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: ja
attributes:
  # Xcode の「Update to recommended settings」警告を抑止する（xcodegen の既定値 1430 のままだと
  # Xcode 27 が毎回設定見直しを提案してくる）。推奨設定自体は下の settings に取り込み済み。
  LastUpgradeCheck: "2700"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    # ↓ Xcode 27 の推奨設定（Update to recommended settings の提案内容を yml 側で採用）。
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    MARKETING_VERSION: "0.2.4"
    CURRENT_PROJECT_VERSION: "6"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: G72M73C546
    CODE_SIGN_STYLE: Automatic
targets:
  LearnLanguage:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - LearnLanguageTests
    sources:
      - path: LearnLanguage
    dependencies:
      - target: ShareExtension
    # Info.plist は xcodegen が properties から生成する（DLNAviewer と同方式）。
    # INFOPLIST_KEY_* ビルド設定方式だと UIBackgroundModes が反映されないため明示ファイルにした。
    info:
      path: LearnLanguage/Info.plist
      properties:
        CFBundleDisplayName: LearnLanguage
        # バージョンはビルド設定を参照する。明示しないと xcodegen が既定値 "1.0"/"1" を直値で埋める。
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # 輸出コンプライアンス: 独自・非標準の暗号化は使わず、OS 標準の HTTPS/TLS のみ
        # （免除対象）。これを宣言すると TestFlight 配布ごとの質問（Missing Compliance）がスキップされる。
        ITSAppUsesNonExemptEncryption: false
        # CloudKit のサイレントプッシュ（他端末の記事変更を即時反映）を受けるために必要。
        # SwiftData+CloudKit が購読を自動管理するので、アプリ側の受信コードは不要。
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguage
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LearnLanguage/LearnLanguage.entitlements
        GENERATE_INFOPLIST_FILE: NO
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
      - path: LearnLanguage/Shared/SharedInbox.swift
      - path: LearnLanguage/Shared/ReadingLevel.swift
      - path: LearnLanguage/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguage.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
  LearnLanguageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LearnLanguageTests
    dependencies:
      - target: LearnLanguage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguageTests
        GENERATE_INFOPLIST_FILE: YES
