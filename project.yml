name: LearnLanguage
options:
  bundleIdPrefix: com.mtkg
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: ja
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: G72M73C546
    CODE_SIGN_STYLE: Automatic
targets:
  LearnLanguage:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - LearnLanguageTests
    sources:
      - path: LearnLanguage
    dependencies:
      - target: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguage
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LearnLanguage/LearnLanguage.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
      - path: LearnLanguage/Shared/SharedInbox.swift
      - path: LearnLanguage/Shared/ReadingLevel.swift
      - path: LearnLanguage/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguage.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
  LearnLanguageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LearnLanguageTests
    dependencies:
      - target: LearnLanguage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.LearnLanguageTests
        GENERATE_INFOPLIST_FILE: YES
